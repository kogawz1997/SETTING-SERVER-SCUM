name: Local Portable Release

on:
  push:
    tags:
      - 'v*-local'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to package, for example v1.0.2-local'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build portable zip and publish GitHub Release
    runs-on: windows-latest

    steps:
      - name: Resolve release tag
        id: release_meta
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag }}"
          }
          if (-not $tag) {
            throw "Release tag is required."
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "zip=dist/SETTING-SERVER-SCUM-$tag.zip" >> $env:GITHUB_OUTPUT

      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release_meta.outputs.tag }}

      - name: Resolve release notes
        id: release_notes
        shell: pwsh
        run: |
          $notes = "docs/releases/${{ steps.release_meta.outputs.tag }}.md"
          if (-not (Test-Path $notes)) {
            $notes = "CHANGELOG.md"
          }
          "notes=$notes" >> $env:GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run release guard checks
        run: |
          npm run check
          npm run release:check
          npm run config:roundtrip
          npm run sample:smoke
          npm run performance:smoke
          npm run test:unit
          npm run test:integration

      - name: Build portable package
        run: npm run package:portable

      - name: Zip portable package
        shell: pwsh
        run: |
          $zip = "${{ steps.release_meta.outputs.zip }}"
          if (Test-Path $zip) {
            Remove-Item -LiteralPath $zip -Force
          }
          Compress-Archive -Path "dist/SETTING-SERVER-SCUM-local/*" -DestinationPath $zip -Force
          Get-Item $zip

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: SETTING SERVER SCUM ${{ steps.release_meta.outputs.tag }}
          body_path: ${{ steps.release_notes.outputs.notes }}
          files: ${{ steps.release_meta.outputs.zip }}
